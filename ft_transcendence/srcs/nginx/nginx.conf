# En esta archivo se indica  a Nginx a qué contenedor enviar
# cada petición (Frontend, Backend, WebSockets...).

events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------------------------
    # 1. REDIRECCIÓN HTTP -> HTTPS (Opcional, pero buena práctica)
    # ----------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;
        #return 301 https://$host$request_uri;
        return 301 https://$host:8443$request_uri;
    }

    # ----------------------------------------------------------------------
    # 2. SERVIDOR PRINCIPAL HTTPS (El único punto de entrada)
    # ----------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name localhost;
        
        #redireccion automática de forma invisible
        error_page 497 =301 https://$host:8443$request_uri;

        # --- CERTIFICADOS SSL (Generados en el Dockerfile) ---
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # --- CABECERAS DE SEGURIDAD (Obligatorio para buena nota) ---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # ------------------------------------------------------------------
        # A) FRONTEND (React + Vite)
        # ------------------------------------------------------------------
        location / {
            # Redirige el tráfico al contenedor 'frontend' (usa el puerto de tu .env, ej: 5173)
            proxy_pass http://frontend:5173;
            
            # Cabeceras estándar para proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Soporte para WebSockets internos de Vite (HMR - Hot Module Replacement)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }

        # ------------------------------------------------------------------
        # B) BACKEND API (NestJS)
        # ------------------------------------------------------------------
        # Todo lo que empiece por /api se va al backend
        location /api/ {
            # Hacemos un "rewrite" para quitarle la palabra /api antes de dárselo a NestJS
            rewrite ^/api/(.*)$ /$1 break;
            # Redirige al contenedor 'backend' (usa el puerto de tu .env, ej: 3000)
            proxy_pass http://backend:3000;
            proxy_http_version 1.1; # Importante para evitar 502 en conexiones persistentes
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # BLOQUE UNIFICADO: Rutas directas al backend + WebSockets (Socket.io)
        # Agrupa todas las llamadas relativas del frontend y el socket del chat/juego
        location ~ ^/(auth|users|friends|chat|game|match|countries|profile|socket\.io) {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            
            # ESTAS DOS LÍNEAS SON VITALES PARA QUE EL CHAT Y EL JUEGO NO SE CORTEN
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # C) HERRAMIENTAS DE ADMINISTRACIÓN Y MONITORIZACIÓN
        # ------------------------------------------------------------------
        
        # --- ADMINER (Gestor de Base de Datos) ---
        location /adminer/ {
            # OJO al '/' final: es crucial para que Nginx recorte '/adminer' antes de enviarlo
            # 2 REGLAS DE SEGURIDAD (Descomentar en producción)
            # allow 127.0.0.1;
            # deny all;
            #
            proxy_pass http://adminer:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- GRAFANA (Dashboards) ---
        location /grafana/ {
            # Grafana escucha internamente en el puerto 3500 de acuerdo con .env
            # 2 REGLAS DE SEGURIDAD (Descomentar en producción)
            # allow 127.0.0.1;
            # deny all;
            #
            proxy_pass http://grafana:3500;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # # PARA FORZAR QUE SE PERMITA EL IFRAME
            # proxy_hide_header X-Frame-Options;
            # proxy_hide_header Content-Security-Policy;
        }

        # --- PROMETHEUS (Métricas brutas) ---
        location /prometheus/ {
            # 2 REGLAS DE SEGURIDAD (Descomentar en producción)
            # allow 127.0.0.1;
            # deny all;
            #
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}